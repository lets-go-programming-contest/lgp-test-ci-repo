name: Prepare Enviroment Action

on:
  workflow_call:

runs:
  using: composite
  steps:
    - name: Checkout utils files
      uses: actions/checkout@v4
      with:
        repository: ${{ env.UTILS_REPO_URL }}
        path: ${{ env.TEST_DIR_UTILS }}

    - name: Checkout common files
      uses: actions/checkout@v4
      with:
        repository: ${{ env.COMMON_REPO_URL }}
        path: ${{ env.TEST_DIR_COMMON }}
    - name: Pull environment container
      shell: bash
      run: docker pull ${{ env.DOCKER_CONTAINER_NAME }}:${{ env.DOCKER_CONTAINER_TAG }}
